kind = "web"
previewPath = "/"
title = "Uno Multiplayer"
version = "1.0.0"
id = "artifacts/uno-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21191

[services.development]
run = "pnpm --filter @workspace/uno-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uno-game", "run", "build" ]
publicDir = "artifacts/uno-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21191"
BASE_PATH = "/"
